services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    volumes:
      - game-data:/app/packages/server
    restart: unless-stopped
    networks:
      - game-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "3000:8080"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - game-net

volumes:
  game-data:

networks:
  game-net:
    driver: bridge
